<!DOCTYPE HTML>
<html>
<head>
  <meta charset="utf-8">
</head>
<body>

  <button onclick="loadPhones()">phones.json 불러오기!</button>

  <script>
    function loadPhones() {
      let xhr = new XMLHttpRequest();

      xhr.open('GET', 'phones.json', false);
      xhr.send();

      if (xhr.status != 200) {
        // 에러 처리
        alert('에러 ' + xhr.status + ': ' + xhr.statusText);
      } else {
        // 결과 표시
        alert(xhr.responseText);
      }
    }
  </script>

</body>
</html>
